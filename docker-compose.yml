services:
  backend:
    build:
      context: ./backend
    container_name: ticketflow-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ticketflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ticketflow
      SPRING_DATASOURCE_PASSWORD: ticketflow123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ticketflow123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ticketflow
      SPRING_RABBITMQ_PASSWORD: ticketflow123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ticketflow
      MINIO_SECRET_KEY: ticketflow123
      MINIO_BUCKET: ticketflow
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ticketflow-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  mysql:
    image: mysql:8.4
    container_name: ticketflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ticketflow
      MYSQL_USER: ticketflow
      MYSQL_PASSWORD: ticketflow123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uticketflow -pticketflow123 --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4
    container_name: ticketflow-redis
    command: redis-server --requirepass ticketflow123 --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ticketflow123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: ticketflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ticketflow
      RABBITMQ_DEFAULT_PASS: ticketflow123
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ticketflow-minio
    environment:
      MINIO_ROOT_USER: ticketflow
      MINIO_ROOT_PASSWORD: ticketflow123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:
